<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life4U - Create Account</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container signup-container">
        <div class="auth-box signup-box">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-droplet"></i>
                    <span>Life4U</span>
                </div>
                <h2>Create an Account</h2>
                <p>Join Life4U as a new patient or donor</p>
            </div>
            
            <form class="auth-form signup-form" id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullname" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <div class="input-icon">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="(123) 456-7890" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <div class="input-icon">
                            <i class="fas fa-calendar"></i>
                            <input type="date" id="dob" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <div class="input-icon">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="address" placeholder="123 Main St. Anytown, USA" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bloodtype">Blood Type</label>
                        <div class="input-icon">
                            <i class="fas fa-tint"></i>
                            <select id="bloodtype" required>
                                <option value="" disabled selected>Select a blood type</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="idproof">ID Proof Number</label>
                        <div class="input-icon">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="idproof" placeholder="Aadhar/PAN/Passport" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="medical">Relevant Medical Details (Optional)</label>
                    <div class="input-icon">
                        <i class="fas fa-notes-medical"></i>
                        <textarea id="medical" placeholder="e.g., Allergies, past conditions..."></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Create password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm-password" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>

                <div class="form-group terms">
                    <label class="checkbox-container">
                        <input type="checkbox" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-auth">Register Now</button>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
